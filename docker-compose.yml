services:
  vps-monitor:
    build: .
    container_name: vps-monitor
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3101}:${PORT:-3101}"
    environment:
      HOST: 0.0.0.0
      PORT: "${PORT:-3101}"
      DATA_FILE: /data/monitor-state.json
      SSH_TARGETS_FILE: /data/ssh-targets.json
      LOCAL_DOCKER_COMMAND_TIMEOUT_MS: "${LOCAL_DOCKER_COMMAND_TIMEOUT_MS:-12000}"
      OFFLINE_AFTER_MS: "${OFFLINE_AFTER_MS:-60000}"
      REALTIME_BROADCAST_MS: "${REALTIME_BROADCAST_MS:-5000}"
      AUTO_SCAN_INTERVAL_MS: "${AUTO_SCAN_INTERVAL_MS:-60000}"
      SSH_SCAN_CONCURRENCY: "${SSH_SCAN_CONCURRENCY:-4}"
    volumes:
      - ./data:/data
